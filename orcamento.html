<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orçamento | Curioni</title><style>body{font-family:Inter,system-ui;margin:0;background:#f7f4ef}.container{width:min(780px,92%);margin:auto;padding:30px 0}.box{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px}label{display:block;font-size:14px;margin:10px 0 4px}input,select,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}button{margin-top:12px;background:#1c1c1c;color:#fff;border:0;border-radius:10px;padding:11px 14px}</style></head><body><main class="container"><a href="curioni-preview.html">← Home</a><h1>Solicitar orçamento</h1><p>Fluxo unificado para cliente final, arquitetos, contract e lojistas.</p><form class="box"><div class="grid"><div><label for="perfil">Perfil</label><select id="perfil"><option>Cliente final</option><option>Arquiteto(a)</option><option>Contract / Construtora</option><option>Lojista</option></select></div><div><label for="nome">Nome completo</label><input id="nome" required></div></div><div class="grid"><div><label for="email">E-mail</label><input id="email" type="email" required></div><div><label for="telefone">Telefone</label><input id="telefone"></div></div><label for="itens">Itens de interesse</label><textarea id="itens" rows="4" placeholder="Ex.: Cadeira Fly (6 un), Poltrona Musa (2 un)"></textarea><button type="submit">Enviar solicitação de orçamento</button></form></main></body></html>
